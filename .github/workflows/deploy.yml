# Deploys the game to GitHub Pages.
# Runs on every push to main, or manually from the Actions tab.
# The site is served at:
#   https://bufordeeds.github.io/family-feud-gender-reveal/
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages the first time this runs.
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The game is plain HTML/CSS/JS at the repo root — no build step.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
